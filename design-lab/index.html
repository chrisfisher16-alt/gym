function getIncrement(equip) {
  if(equip==='dumbbell') return 1;
  return 2.5; // barbell, cable, machine
}

function initWorkoutState() {
  return WORKOUT_EXERCISES.map(ex => {
    // Check if all sets hit target reps last session
    const allHitTarget = ex.prev.every(p=>p.r>=ex.targetReps);
    const increment = getIncrement(ex.equip);
    return {
      ...ex,
      sets: Array.from({length:ex.targetSets},(_,i) => {
        const prevW = ex.prev[i]?.w || ex.prev[0]?.w || 0;
        const suggestUp = allHitTarget && prevW > 0;
        const weight = suggestUp ? prevW + increment : prevW;
        return {
          weight,
          reps: ex.targetReps,
          completed: false,
          isPR: false,
          suggested: suggestUp, // show "↑" indicator
        };
      })
    };
  });
}

function smoothPath(pts, w, h, pad=0) {
  if (!pts || !pts.length) return {line:'',area:'',dots:[]};
  if (pts.length === 1) {
    const x = w/2, y = h/2;
    return {line:`M${x},${y}`,area:`M${x},${y} L${x},${h} Z`,dots:[{x,y}]};
  }
  const max = Math.max(...pts), min = Math.min(...pts);
  const range = max - min || 1;
  const coords = pts.map((v,i) => ({
    x: pad + (i/(pts.length-1))*(w-pad*2),
    y: pad + (1-(v-min)/range)*(h-pad*2)
  }));
  let d = `M${coords[0].x},${coords[0].y}`;
  for(let i=1;i<coords.length;i++){
    const cx=(coords[i-1].x+coords[i].x)/2;
    d+=` C${cx},${coords[i-1].y} ${cx},${coords[i].y} ${coords[i].x},${coords[i].y}`;
  }
  const area = d+` L${coords[coords.length-1].x},${h} L${coords[0].x},${h} Z`;
  return {line:d, area, dots:coords};
}

// ── Progress Ring (SVG) ──
function ProgressRing({size=120,stroke=8,progress=0,color=C.cal,trackColor=C.s2,children,glowColor}) {
  const r = (size-stroke)/2;
  const circ = 2*Math.PI*r;
  const offset = circ*(1-Math.min(progress,1));
  const gradId = `rg-${size}-${color.replace(/[^a-zA-Z0-9]/g,'')}`;
  return (
    <div style={{position:'relative',width:size,height:size}}>
      <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
        <defs>
          <linearGradient id={gradId} x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor={color}/>
            <stop offset="100%" stopColor={color} stopOpacity="0.6"/>
          </linearGradient>
        </defs>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={`url(#${gradId})`} strokeWidth={stroke}
          strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
          style={{'--circ':circ,animation:'ringDraw 0.8s ease-out',filter:glowColor?`drop-shadow(0 0 6px ${glowColor})`:'none'}}/>
      </svg>
      {children && <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>{children}</div>}
    </div>
  );
}

// ── MacroBar ──
function MacroBar({label, current, target, color}) {
  const pct = Math.min(current/target,1);
  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <span style={{fontSize:12,fontWeight:600,color:C.t2}}>{label}</span>
        <span><span style={{fontSize:13,fontWeight:400,color:C.t1}}>{current}g</span><span style={{fontSize:13,color:C.t3}}> / {target}g</span></span>
      </div>
      <div style={{height:6,borderRadius:3,background:C.s2,overflow:'hidden'}}>
        <div style={{height:6,borderRadius:3,background:color,width:`${pct*100}%`,transition:'width 0.4s ease-out'}}/>
      </div>
    </div>
  );
}

// ── Sparkline (SVG) ──
let _spIdx=0;
function Sparkline({data,width=100,height=28,color=C.brand,style}) {
  if(!data||!data.length) return null;
  const {line,dots} = smoothPath(data,width,height,2);
  const gradId = React.useMemo(()=>`sp-${++_spIdx}`,[]);
  return (
    <svg width={width} height={height} style={{display:'block',...style}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={smoothPath(data,width,height,2).area} fill={`url(#${gradId})`}/>
      <path d={line} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round"/>
      {dots.length>0 && <circle cx={dots[dots.length-1].x} cy={dots[dots.length-1].y} r="2.5" fill={color}/>}
    </svg>
  );
}

// ── Area Chart (larger, with labels) ──
let _acIdx=0;
function AreaChart({data,width=362,height=140,color=C.brand,labels,refLine,style}) {
  const {line,area,dots} = smoothPath(data,width,height-24,8);
  const gradId = React.useMemo(()=>`ac-${++_acIdx}`,[]);
  const max = Math.max(...data), min = Math.min(...data);
  const refY = refLine ? 8 + (1-(refLine-min)/(max-min||1))*(height-32) : null;
  return (
    <div style={style}>
      <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor={color} stopOpacity="0.15"/>
            <stop offset="100%" stopColor={color} stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={area} fill={`url(#${gradId})`}/>
        <path d={line} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"/>
        {refY && <line x1="0" y1={refY} x2={width} y2={refY} stroke={C.t3} strokeWidth="1" strokeDasharray="4,4"/>}
        {dots.length>0 && <circle cx={dots[dots.length-1].x} cy={dots[dots.length-1].y} r="4" fill={color} style={{filter:`drop-shadow(0 0 4px ${color})`}}/>}
      </svg>
      {labels && (
        <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
          {labels.map((l,i)=><span key={i} style={{fontSize:11,fontWeight:500,color:C.t3}}>{l}</span>)}
        </div>
      )}
    </div>
  );
}

  return (

              </button>

        </Card>
      </div>

      {/* Hydration */}
      <div style={{padding:'20px 16px 0'}}>
        <Overline>HYDRATION</Overline>
        <Card style={{marginTop:12,cursor:'pointer'}} onClick={onShowHydration}>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <ProgressRing size={56} stroke={4} progress={MOCK.hydration.current/MOCK.hydration.target}
              color={C.info} glowColor={C.info+'33'}>
              <Ico name="water" size={18} color={C.info}/>

            <div style={{flex:1}}>
              <div style={{fontSize:18,fontWeight:700,color:C.t1}}>{MOCK.hydration.current} oz</div>

            </div>
            <Ico name="chevron-forward" size={20} color={C.t3}/>
          </div>
        </Card>
      </div>

      <div style={{height:100}}/>

      {/* FAB */}
      <button className="btn-press" style={{
        position:'absolute',right:16,bottom:92,
        display:'flex',alignItems:'center',gap:4,
        height:52,borderRadius:9999,paddingLeft:20,paddingRight:20,
        background:C.brand,border:'none',cursor:'pointer',
        boxShadow:'0 4px 12px rgba(0,0,0,0.3)',fontFamily:'inherit',
      }}>
        <Ico name="add" size={24} color={C.inv}/>
        <span style={{fontSize:14,fontWeight:600,color:C.inv}}>Log Meal</span>
      </button>
    </div>
  );
}

// ── Format seconds to mm:ss ──
function fmt(s){const m=Math.floor(s/60);const sec=s%60;return `${m}:${sec.toString().padStart(2,'0')}`}

// ── Stepper (weight/reps +/- control) ──
function Stepper({value,onChange,step=2.5,min=0,label}) {
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
      <div style={{display:'flex',alignItems:'center',gap:2}}>
        <button className="btn-press" onClick={()=>onChange(Math.max(min,value-step))}
          style={{width:44,height:44,borderRadius:8,background:C.s2,border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:20,fontWeight:700,color:C.t1,fontFamily:'inherit'}}>−</button>
        <div aria-live="polite"
          style={{minWidth:56,height:44,borderRadius:8,background:C.s2,border:`1px solid transparent`,
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:20,fontWeight:700,color:C.t1,fontFamily:'inherit',
            padding:'0 4px'}}>
          {value%1===0?value:value.toFixed(1)}
        </div>
        <button className="btn-press" onClick={()=>onChange(value+step)}
          style={{width:44,height:44,borderRadius:8,background:C.s2,border:'none',cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:20,fontWeight:700,color:C.t1,fontFamily:'inherit'}}>+</button>
      </div>
      {label && <span style={{fontSize:11,fontWeight:500,color:C.t3}}>{label}</span>}
    </div>
  );
}

// ── Set Row (inline in exercise card) ──
function SetRow({set,idx,prevSet,onToggle,onWeight,onReps}) {
  const [justCompleted, setJustCompleted] = useState(false);
  const [justPR, setJustPR] = useState(false);

  const handleToggle = () => {
    if(!set.completed){
      setJustCompleted(true);
      if(set.isPR) setJustPR(true);
      setTimeout(()=>{setJustCompleted(false);setJustPR(false)},500);
    }
    onToggle();
  };

  return (
    <div className={justCompleted?(justPR?'set-pr':'set-done'):''}
      style={{
        display:'flex',alignItems:'center',gap:2,padding:'6px 8px',borderRadius:8,marginBottom:4,
        background:set.completed?(set.isPR?C.brandM:C.successM):'transparent',
        transition:'background 0.3s ease',
      }}>
      {/* Set # */}
      <div style={{width:28,fontSize:12,fontWeight:600,color:C.t3,textAlign:'center'}}>{idx+1}</div>
      {/* Prev */}
      <div style={{width:52,fontSize:11,fontWeight:500,color:C.t3,textAlign:'center'}}>
        {prevSet?`${prevSet.w}×${prevSet.r}`:'—'}
      </div>
      {/* Weight */}
      <div style={{flex:1,display:'flex',justifyContent:'center',gap:1}}>
        <button className="btn-press" onClick={()=>onWeight(Math.max(0,set.weight-2.5))}
          style={{width:32,height:38,borderRadius:6,background:C.s2,border:'none',cursor:'pointer',
            fontSize:14,fontWeight:700,color:C.t1,fontFamily:'inherit'}}>−</button>
        <div style={{minWidth:48,height:38,borderRadius:6,background:set.suggested&&!set.completed?C.successM:C.s2,
          display:'flex',alignItems:'center',justifyContent:'center',position:'relative',
          fontSize:16,fontWeight:700,color:C.t1,padding:'0 2px',
          border:set.suggested&&!set.completed?`1px solid ${C.success}25`:'1px solid transparent'}}>
          {set.weight%1===0?set.weight:set.weight.toFixed(1)}
          {set.suggested&&!set.completed && <span style={{fontSize:9,color:C.success,marginLeft:1,fontWeight:700}}>↑</span>}
        </div>
        <button className="btn-press" onClick={()=>onWeight(set.weight+2.5)}
          style={{width:32,height:38,borderRadius:6,background:C.s2,border:'none',cursor:'pointer',
            fontSize:14,fontWeight:700,color:C.t1,fontFamily:'inherit'}}>+</button>
      </div>
      {/* Reps */}
      <div style={{flex:1,display:'flex',justifyContent:'center',gap:1}}>
        <button className="btn-press" onClick={()=>onReps(Math.max(1,set.reps-1))}
          style={{width:32,height:38,borderRadius:6,background:C.s2,border:'none',cursor:'pointer',
            fontSize:14,fontWeight:700,color:C.t1,fontFamily:'inherit'}}>−</button>
        <div style={{minWidth:40,height:38,borderRadius:6,background:C.s2,display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:16,fontWeight:700,color:C.t1}}>{set.reps}</div>
        <button className="btn-press" onClick={()=>onReps(set.reps+1)}
          style={{width:32,height:38,borderRadius:6,background:C.s2,border:'none',cursor:'pointer',
            fontSize:14,fontWeight:700,color:C.t1,fontFamily:'inherit'}}>+</button>
      </div>
      {/* Check */}
      <button className={`btn-press ${justCompleted?'check-pop':''}`} onClick={handleToggle}
        style={{width:44,height:38,borderRadius:8,border:'none',cursor:'pointer',
          display:'flex',alignItems:'center',justifyContent:'center',
          background:set.completed?(set.isPR?C.brand:C.success):C.s2,
          transition:'background 0.15s ease'}}>
        <Ico name={set.completed?'checkmark':'checkmark-outline'} size={22}
          color={set.completed?C.inv:C.t3}/>
      </button>
    </div>
  );
}

// ── Active Workout Screen (List View) ──
function ActiveWorkoutScreen({exercises,elapsed,onEnd,onFinish,onToggleSet,onSetWeight,onSetReps,onAddSet,
  viewMode,onViewChange,focusExIdx,focusSetIdx,onFocusNav,onFocusComplete}) {
  const totalSets = exercises.reduce((a,e)=>a+e.sets.length,0);
  const doneSets = exercises.reduce((a,e)=>a+e.sets.filter(s=>s.completed).length,0);
  const exRefs = useRef([]);
  const scrollRef = useRef(null);
  const [navIdx, setNavIdx] = useState(0);

  const navTo = (dir) => {
    const next = Math.max(0,Math.min(exercises.length-1,navIdx+dir));
    setNavIdx(next);
    const el = exRefs.current[next];
    if(el && scrollRef.current) {
      scrollRef.current.scrollTo({top:el.offsetTop-16,behavior:'smooth'});
    }
  };

  // When toggle switches to Focus, use current navIdx
  const handleViewChange = (v) => {
    if(v==='focused' && viewMode!=='focused') {
      onFocusNav(navIdx, findNextIncompleteSet(exercises[navIdx]));
    }
    onViewChange(v);
  };

  // Find the next incomplete set for an exercise, or 0
  function findNextIncompleteSet(ex) {
    if(!ex) return 0;
    const idx = ex.sets.findIndex(s=>!s.completed);
    return idx >= 0 ? idx : 0;
  }

  const focusEx = exercises[focusExIdx];
  const focusSet = focusEx ? focusEx.sets[focusSetIdx] : null;
  const focusPrev = focusEx ? focusEx.prev[focusSetIdx] : null;

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column',background:C.bg}}>
      {/* Top Bar */}
      <div style={{
        display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'10px 16px',borderBottom:`1px solid ${C.border}`,
        background:C.barBlur,backdropFilter:'blur(24px)',flexShrink:0,
      }}>
        <button onClick={onEnd} style={{fontSize:14,fontWeight:600,color:C.error,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',minWidth:44}}>
          End
        </button>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{fontSize:14,fontWeight:600,color:C.t1}}>Push Day</div>
            <span style={{fontSize:11,fontWeight:500,color:C.t2,fontVariantNumeric:'tabular-nums'}}>{fmt(elapsed)}</span>
          </div>
          <SegToggle
            options={[
              {value:'list',label:'List'},
              {value:'focused',label:'Focus'},
            ]}
            value={viewMode}
            onChange={handleViewChange}
          />
        </div>
        <div style={{minWidth:44,display:'flex',justifyContent:'flex-end'}}>
          <button style={{background:'none',border:'none',cursor:'pointer',padding:4}}>
            <Ico name="add" size={24} color={C.brand}/>
          </button>
        </div>
      </div>

      {viewMode === 'list' ? (
        <>
          {/* Exercise List */}
          <div ref={scrollRef} className="scroll-area" style={{flex:1,padding:16}}>
            {exercises.map((ex,ei)=>(
              <div key={ei} ref={el=>exRefs.current[ei]=el}>
                <ExerciseCard exercise={ex} exIdx={ei}
                  onToggleSet={onToggleSet} onSetWeight={onSetWeight}
                  onSetReps={onSetReps} onAddSet={onAddSet} onFocusSet={(ei2,si2)=>{
                    onFocusNav(ei2,si2);
                    onViewChange('focused');
                  }}/>
              </div>
            ))}
            <div style={{height:80}}/>
          </div>

          {/* Bottom Toolbar - List */}
          <div style={{
            display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'8px 16px',borderTop:`1px solid ${C.border}`,
            background:C.barBlur,backdropFilter:'blur(24px)',flexShrink:0,
            paddingBottom:12,
          }}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <button className="btn-press" onClick={()=>navTo(-1)}
                style={{width:36,height:36,borderRadius:8,background:C.s2,border:'none',cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',opacity:navIdx===0?0.3:1}}>
                <Ico name="chevron-back" size={18} color={C.t2}/>
              </button>
              <span style={{fontSize:12,fontWeight:600,color:C.t2,minWidth:40,textAlign:'center'}}>
                {navIdx+1} of {exercises.length}
              </span>
              <button className="btn-press" onClick={()=>navTo(1)}
                style={{width:36,height:36,borderRadius:8,background:C.s2,border:'none',cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',opacity:navIdx>=exercises.length-1?0.3:1}}>
                <Ico name="chevron-forward" size={18} color={C.t2}/>
              </button>
            </div>

                </Btn>
                {focusSet.isPR && (
                  <div style={{textAlign:'center',marginTop:8}}>
                    <PRBadge text="NEW PR"/>
                  </div>
                )}
              </div>
            </div>
          ) : null}

          {/* Bottom Toolbar - Focus */}
          <div style={{
            display:'flex',alignItems:'center',justifyContent:'space-between',
            padding:'8px 16px',borderTop:`1px solid ${C.border}`,
            background:C.barBlur,backdropFilter:'blur(24px)',flexShrink:0,
            paddingBottom:12,

            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <button className="btn-press" onClick={()=>{
                  if(focusSetIdx > 0) onFocusNav(focusExIdx, focusSetIdx-1);

              </button>
              <span style={{fontSize:12,fontWeight:600,color:C.t2,minWidth:60,textAlign:'center'}}>

              </span>
              <button className="btn-press" onClick={()=>{
                  if(focusEx && focusSetIdx < focusEx.sets.length-1) onFocusNav(focusExIdx, focusSetIdx+1);

                }}
                style={{width:36,height:36,borderRadius:8,background:C.s2,border:'none',cursor:'pointer',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  opacity:(focusExIdx>=exercises.length-1&&focusSetIdx>=(focusEx?.sets.length||1)-1)?0.3:1}}>

            <div style={{fontSize:12,fontWeight:500,color:C.t3}}>{doneSets}/{totalSets} sets</div>
            <Btn variant="primary" size="md" onClick={onFinish}
              disabled={doneSets===0} full={false}
              style={{paddingLeft:20,paddingRight:20}}>

      )}
    </div>
  );
}

// ── Hydration Detail Sheet ──
function HydrationDetailSheet({onClose}) {
  const hyd = MOCK.hydration;
  const waterOz = MOCK.nutrition.water;
  const [log, setLog] = useState(hyd.log);
  const [current, setCurrent] = useState(hyd.current);
  const pct = Math.min(current / hyd.target, 1);

  const addWater = (oz) => {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    setLog(prev=>[...prev,{time:timeStr,amount:oz}]);
    setCurrent(prev=>{
      const next=prev+oz;
      // Sync back to mock data so parent screens reflect the update
      MOCK.hydration.current=next;
      MOCK.hydration.log=[...MOCK.hydration.log,{time:timeStr,amount:oz}];
      MOCK.nutrition.water.current=next;
      return next;
    });
  };

  // Build timeline markers (6AM to 10PM)
  const hours = [6,8,10,12,14,16,18,20,22];
  const hourLabels = ['6a','8a','10a','12p','2p','4p','6p','8p','10p'];

  return (
    <div style={{position:'fixed',inset:0,zIndex:300,display:'flex',flexDirection:'column',justifyContent:'flex-end',
      background:C.overlayBg,backdropFilter:'blur(20px)'}}
      onClick={(e)=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="summary-enter" style={{
        background:C.s1,borderTopLeftRadius:24,borderTopRightRadius:24,
        padding:'8px 24px 32px',maxHeight:'90%',overflow:'auto',boxShadow:C.sheetShadow,
      }}>
        {/* Drag handle */}
        <div style={{width:36,height:4,borderRadius:2,background:C.t3,opacity:0.3,margin:'0 auto 16px'}}/>

        {/* Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <Overline>HYDRATION</Overline>
            <div style={{fontSize:24,fontWeight:700,lineHeight:'30px',color:C.t1,marginTop:4}}>Water Intake</div>
          </div>
          <button onClick={onClose} style={{background:C.s2,border:'none',cursor:'pointer',
            width:44,height:44,borderRadius:9999,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <Ico name="close" size={18} color={C.t2}/>
          </button>
        </div>

        {/* Progress Ring */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginTop:24}}>
          <ProgressRing size={160} stroke={10} progress={pct}
            color={pct>=1?C.success:C.info} glowColor={pct>=1?C.success+'40':C.info+'40'}>
            <span style={{fontSize:36,fontWeight:700,color:C.t1}}>{current}</span>
            <span style={{fontSize:12,fontWeight:500,color:C.t2}}>of {hyd.target} oz</span>
          </ProgressRing>
          <div style={{fontSize:14,fontWeight:500,color:pct>=1?C.success:C.t2,marginTop:12}}>
            {pct>=1 ? 'Goal reached!' : `${hyd.target-current} oz remaining`}
          </div>
        </div>

        {/* Quick Add Buttons */}
        <div style={{display:'flex',gap:10,marginTop:24}}>
          {[8,12,16,24].map(oz=>(
            <button key={oz} className="btn-press" onClick={()=>addWater(oz)}
              style={{flex:1,height:52,borderRadius:12,background:C.s2,border:`1px solid ${C.border}`,
                cursor:'pointer',fontFamily:'inherit',display:'flex',flexDirection:'column',alignItems:'center',
                justifyContent:'center',gap:2}}>
              <Ico name="water" size={16} color={C.info}/>
              <span style={{fontSize:13,fontWeight:700,color:C.t1}}>{oz}oz</span>
            </button>
          ))}
        </div>

        <div className="divider" style={{marginTop:20}}/>

        {/* Timeline visualization */}
        <div style={{marginTop:16}}>
          <div style={{fontSize:12,fontWeight:600,color:C.t3,marginBottom:12}}>TODAY'S TIMELINE</div>
          <div style={{position:'relative',height:32,background:C.s2,borderRadius:8,overflow:'hidden'}}>
            {/* Hour markers */}
            {hours.map((h,i)=>(
              <div key={h} style={{position:'absolute',left:`${((h-6)/16)*100}%`,top:0,bottom:0,
                width:1,background:C.border}}>
                <span style={{position:'absolute',bottom:-16,left:-8,fontSize:9,fontWeight:500,color:C.t3,whiteSpace:'nowrap'}}>
                  {hourLabels[i]}
                </span>
              </div>
            ))}
            {/* Log entries as marks */}
            {log.map((entry,i)=>{
              // Parse time to position
              const match = entry.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
              if(!match) return null;
              let hr = parseInt(match[1]);
              const min = parseInt(match[2]);
              const ampm = match[3].toUpperCase();
              if(ampm==='PM' && hr!==12) hr+=12;
              if(ampm==='AM' && hr===12) hr=0;
              const pos = Math.max(0,Math.min(100,((hr+min/60-6)/16)*100));
              const barH = Math.min(100, (entry.amount/24)*100);
              return (
                <div key={i} style={{position:'absolute',left:`${pos}%`,bottom:0,
                  width:8,height:`${barH}%`,minHeight:6,background:C.info,borderRadius:4,
                  transform:'translateX(-50%)',opacity:0.8}}
                  title={`${entry.time}: ${entry.amount}oz`}/>
              );
            })}
          </div>
          <div style={{height:18}}/> {/* Space for labels */}
        </div>

        <div className="divider" style={{marginTop:12}}/>

        {/* Log entries list */}
        <div style={{marginTop:16}}>
          <div style={{fontSize:12,fontWeight:600,color:C.t3,marginBottom:12}}>LOG</div>
          <div style={{display:'flex',flexDirection:'column',gap:0}}>
            {log.slice().reverse().map((entry,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',
                padding:'10px 0',borderBottom:i<log.length-1?`1px solid ${C.border}`:'none'}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:32,height:32,borderRadius:8,background:C.infoM,
                    display:'flex',alignItems:'center',justifyContent:'center'}}>
                    <Ico name="water" size={16} color={C.info}/>
                  </div>
                  <div>
                    <div style={{fontSize:14,fontWeight:600,color:C.t1}}>{entry.amount} oz</div>
                    <div style={{fontSize:11,fontWeight:500,color:C.t3}}>{entry.time}</div>
                  </div>
                </div>
              </div>
            ))}
            {log.length===0 && (
              <div style={{textAlign:'center',padding:'24px 0'}}>
                <Ico name="water-outline" size={32} color={C.t3}/>
                <div style={{fontSize:13,fontWeight:500,color:C.t3,marginTop:8}}>No water logged yet today</div>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

}

// ── Rest Timer Overlay ──
function RestTimerOverlay({duration,remaining,nextExercise,onSkip,onAddTime,onPreset,activeDuration}) {
  const r = 106;
  const circ = 2*Math.PI*r;
  const progress = remaining/duration;
  const offset = circ*(1-progress);
  const isLow = remaining <= 5;

  const presets = [60,90,120,180];
  const presetLabels = ['60s','90s','2m','3m'];

  return (
    <div style={{
      position:'absolute',inset:0,zIndex:100,
      background:C.overlayHeavy,backdropFilter:'blur(32px)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
    }}>
      {/* Ring */}
      <div style={{position:'relative',width:220,height:220}}>
        <svg width={220} height={220} style={{transform:'rotate(-90deg)'}}>
          <circle cx={110} cy={110} r={r} fill="none" stroke={C.s2} strokeWidth={4}/>
          <circle cx={110} cy={110} r={r} fill="none" stroke={C.brand} strokeWidth={4}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"
            style={{transition:'stroke-dashoffset 1s linear',
              filter:isLow?`drop-shadow(0 0 8px ${C.brand})`:`drop-shadow(0 0 4px ${C.brand}4D)`}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:56,fontWeight:300,lineHeight:'64px',color:isLow?C.brand:C.t1,
            letterSpacing:'-0.02em',fontVariantNumeric:'tabular-nums',
            transition:'color 0.3s ease'}}>
            {fmt(remaining)}
          </div>
          <div style={{fontSize:15,fontWeight:500,color:C.t2,marginTop:4}}>Rest</div>
        </div>
      </div>

      {/* Up Next */}
      {nextExercise && (
        <div style={{marginTop:40,textAlign:'center'}}>
          <Overline>UP NEXT</Overline>
          <div style={{fontSize:18,fontWeight:600,color:C.t1,marginTop:4}}>{nextExercise.name}</div>
          <div style={{fontSize:13,fontWeight:400,color:C.t2,marginTop:2}}>
            {nextExercise.targetSets}×{nextExercise.targetReps}
          </div>
        </div>
      )}

      {/* Presets */}
      <div style={{display:'flex',gap:8,marginTop:32}}>
        {presets.map((p,i)=>(
          <button key={p} className="btn-press" onClick={()=>onPreset(p)}
            style={{borderRadius:9999,paddingLeft:16,paddingRight:16,paddingTop:10,paddingBottom:10,
              background:activeDuration===p?C.brandM:C.s2,
              border:activeDuration===p?`1px solid ${C.borderBrand}`:`1px solid transparent`,
              fontSize:13,fontWeight:600,color:activeDuration===p?C.brand:C.t2,
              cursor:'pointer',fontFamily:'inherit'}}>
            {presetLabels[i]}
          </button>
        ))}
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:12,marginTop:24}}>
        <Btn variant="ghost" size="md" onClick={onAddTime} full={false} style={{paddingLeft:20,paddingRight:20}}>
          +30s
        </Btn>
        <Btn variant="secondary" size="md" onClick={onSkip} full={false} style={{paddingLeft:20,paddingRight:20}}>
          Skip
        </Btn>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════
   APP
   ═══════════════════════════════════════════ */
function App() {
  const [tab, setTab] = useState('today');
  const [isEmpty, setIsEmpty] = useState(false);

  // Theme state: 'dark' | 'light' | 'system'
  const [themePref, setThemePref] = useState('dark');
  const [sysTheme, setSysTheme] = useState(
    window.matchMedia('(prefers-color-scheme:light)').matches ? 'light' : 'dark'
  );
  const activeTheme = themePref === 'system' ? sysTheme : themePref;

  // Listen for system theme changes
  useEffect(()=>{
    const mq = window.matchMedia('(prefers-color-scheme:light)');
    const handler = (e) => setSysTheme(e.matches?'light':'dark');
    mq.addEventListener('change', handler);
    return ()=>mq.removeEventListener('change', handler);
  },[]);

  // Apply theme on mount and when preference changes
  useEffect(()=>{
    applyTheme(activeTheme==='light'?LIGHT:DARK);
  },[activeTheme]);

  // Workout flow state
  const [wkActive, setWkActive] = useState(false);
  const [wkView, setWkView] = useState('list'); // 'list' | 'focused'
  const [wkExercises, setWkExercises] = useState(null);
  const [wkElapsed, setWkElapsed] = useState(0);
  const [focusEx, setFocusEx] = useState(0);
  const [focusSet, setFocusSet] = useState(0);
  const [showSummary, setShowSummary] = useState(false);

  // Sheet state
  const [showPreview, setShowPreview] = useState(false);
  const [showHydration, setShowHydration] = useState(false);
  const [showProfile, setShowProfile] = useState(false);
  const [showDayPreview, setShowDayPreview] = useState(null); // dayData object or null
  const [showConfirm, setShowConfirm] = useState(null); // {title,body,...} or null

  // Workout completion tracking
  const [wkCompleted, setWkCompleted] = useState(false);
  const [wkCompletedData, setWkCompletedData] = useState(null);
  const [isProgramComplete, setIsProgramComplete] = useState(false);

  // Rest timer state
  const [restActive, setRestActive] = useState(false);
  const [restDuration, setRestDuration] = useState(90);
  const [restRemaining, setRestRemaining] = useState(90);
  const [restNextEx, setRestNextEx] = useState(null);

  // Elapsed timer
  useEffect(()=>{
    if(!wkActive||showSummary) return;
    const id = setInterval(()=>setWkElapsed(e=>e+1),1000);
    return ()=>clearInterval(id);
  },[wkActive,showSummary]);

  // Rest countdown
  useEffect(()=>{
    if(!restActive) return;
    if(restRemaining<=0){ setRestActive(false); return; }
    const id = setInterval(()=>setRestRemaining(r=>r-1),1000);
    return ()=>clearInterval(id);
  },[restActive,restRemaining]);

  // Start workout
  const startWorkout = () => {
    setShowPreview(false);
    setShowDayPreview(null);
    setWkExercises(initWorkoutState());
    setWkElapsed(0);
    setWkView('list');
    setShowSummary(false);
    setRestActive(false);
    setWkCompleted(false);
    setWkCompletedData(null);
    setIsProgramComplete(false);
    setWkActive(true);
    setTab('_workout');
  };

  // Start a different day's workout (from day pill preview)
  const startDayWorkout = (dayData) => {
    if(wkActive && wkExercises) {
      const loggedSets = wkExercises.reduce((a,e)=>a+e.sets.filter(s=>s.completed).length,0);
      setShowDayPreview(null);
      setShowConfirm({
        title: 'Replace active workout?',
        body: `You have a workout in progress (${MOCK.workout.name} — ${loggedSets} sets logged). Starting a new workout will discard your current progress. This can't be undone.`,
        confirmLabel: 'Discard & Start',
        cancelLabel: 'Keep Current',
        destructive: true,
        onConfirm: () => {
          setShowConfirm(null);
          startWorkout();
        },
        onCancel: () => setShowConfirm(null),
      });
    } else {
      startWorkout();
    }
  };

  // End/discard workout (user chose to abandon)
  const endWorkout = () => {
    setWkActive(false);
    setWkExercises(null);
    setRestActive(false);
    setShowSummary(false);
    setTab('today');
  };

  // Complete workout → track completion data, show summary
  const finishWorkout = () => {
    setRestActive(false);
    if(wkExercises) {
      const totalSets = wkExercises.reduce((a,e)=>a+e.sets.filter(s=>s.completed).length,0);
      const totalVolume = wkExercises.reduce((a,e)=>a+e.sets.filter(s=>s.completed).reduce((b,s)=>b+s.weight*s.reps,0),0);
      setWkCompletedData({
        duration: fmt(wkElapsed),
        sets: totalSets,
        volume: `${(totalVolume/1000).toFixed(1)}k lbs`,
      });
    }
    setShowSummary(true);
  };

  // After summary dismissed → mark workout as completed today
  const dismissSummary = () => {
    setWkActive(false);
    setWkCompleted(true);
    setShowSummary(false);
    setTab('today');
  };

  // View summary of completed workout (re-show sheet)
  const viewCompletedSummary = () => {
    if(wkExercises && wkCompletedData) {
      setWkActive(true);
      setShowSummary(true);
      setTab('_workout');
    }
  };

  // Update a set's weight (clears suggested flag on manual change)
  const setWeight = (ei,si,val) => {
    setWkExercises(prev=>{
      const next=[...prev];
      next[ei]={...next[ei],sets:[...next[ei].sets]};
      next[ei].sets[si]={...next[ei].sets[si],weight:val,suggested:false};
      return next;
    });
  };

  // Update a set's reps
  const setReps = (ei,si,val) => {
    setWkExercises(prev=>{
      const next=[...prev];
      next[ei]={...next[ei],sets:[...next[ei].sets]};
      next[ei].sets[si]={...next[ei].sets[si],reps:val};
      return next;
    });
  };

  // Toggle set completion
  const toggleSet = (ei,si) => {
    setWkExercises(prev=>{
      const next=[...prev];
      const ex = {...next[ei],sets:[...next[ei].sets]};
      const set = {...ex.sets[si]};
      set.completed = !set.completed;
      // PR detection on complete
      if(set.completed && set.weight > ex.prWeight) {
        set.isPR = true;
      } else if(!set.completed) {
        set.isPR = false;
      }
      ex.sets[si] = set;
      next[ei] = ex;
      return next;
    });

    // Start rest timer on set completion
    if(wkExercises && !wkExercises[ei].sets[si].completed) {
      const restSec = wkExercises[ei].restSec || 90;
      setRestDuration(restSec);
      setRestRemaining(restSec);
      // Find next exercise for preview
      const nextUncompleted = wkExercises.find((e,i)=>i>ei && e.sets.some(s=>!s.completed));
      setRestNextEx(nextUncompleted || (ei < wkExercises.length-1 ? wkExercises[ei+1] : null));
      setRestActive(true);
    }
  };

  // Focused view complete
  const focusComplete = (ei,si) => {
    toggleSet(ei,si);
    // Advance to next set
    if(wkExercises) {
      const ex = wkExercises[ei];
      if(!ex.sets[si].completed) {
        // Was completing (not undoing)
        if(si < ex.sets.length-1) {
          setFocusSet(si+1);
        } else if(ei < wkExercises.length-1) {
          setFocusEx(ei+1);
          setFocusSet(0);
        }
      }
    }
  };

  // Add set to exercise
  const addSet = (ei) => {
    setWkExercises(prev=>{
      const next=[...prev];
      const ex = {...next[ei],sets:[...next[ei].sets]};
      const lastSet = ex.sets[ex.sets.length-1];
      ex.sets.push({weight:lastSet?.weight||0,reps:ex.targetReps,completed:false,isPR:false});
      next[ei] = ex;
      return next;
    });
  };

  // Navigate focus to specific exercise/set
  const focusNav = (ei,si) => {
    setFocusEx(ei);
    setFocusSet(si);
  };

  // Rest timer controls
  const skipRest = () => setRestActive(false);
  const addRestTime = () => {
    // Only extend remaining time, adjust duration to match so ring animation stays smooth
    setRestRemaining(r=>r+30);
    setRestDuration(d=>Math.max(d, restRemaining+30));
  };
  const presetRest = (sec) => {
    setRestDuration(sec);
    setRestRemaining(sec);
  };

  // What to render in the workout area
  const renderWorkout = () => {
    if(!wkExercises) return null;

    return (
      <div style={{height:'100%',position:'relative'}}>
        <ActiveWorkoutScreen
          exercises={wkExercises} elapsed={wkElapsed}
          onEnd={endWorkout} onFinish={finishWorkout}
          onToggleSet={toggleSet} onSetWeight={setWeight}
          onSetReps={setReps} onAddSet={addSet}
          viewMode={wkView} onViewChange={setWkView}
          focusExIdx={focusEx} focusSetIdx={focusSet}
          onFocusNav={focusNav} onFocusComplete={focusComplete}/>

        {/* Rest Timer Overlay */}
        {restActive && (
          <RestTimerOverlay
            duration={restDuration} remaining={restRemaining}
            nextExercise={restNextEx}
            onSkip={skipRest} onAddTime={addRestTime}
            onPreset={presetRest} activeDuration={restDuration}/>
        )}

        {/* Workout Summary */}
        {showSummary && (
          <WorkoutSummary exercises={wkExercises} elapsed={wkElapsed}
            onDone={dismissSummary} isProgramComplete={isProgramComplete}/>
        )}
      </div>
    );
  };

  return (
    <ThemeCtx.Provider value={{theme:activeTheme,themePref,setTheme:setThemePref}}>
    <div className="phone" style={{display:'flex',flexDirection:'column'}}>
      {/* Safe area top spacer */}
      <div style={{height:47,background:C.bg,flexShrink:0}}/>

      {/* Content */}
      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        {/* Workout screen (shown when active AND on workout view) */}
        {wkActive && (
          <div style={{height:'100%',display:tab==='_workout'?'block':'none'}}>
            {renderWorkout()}
          </div>
        )}
        <div style={{height:'100%',display:tab==='today'?'block':'none'}}>
          <TodayScreen onStartWorkout={startWorkout} onShowPreview={()=>setShowPreview(true)}
            onShowHydration={()=>setShowHydration(true)} isEmpty={isEmpty}
            wkActive={wkActive} wkExercises={wkExercises} wkElapsed={wkElapsed}
            onResume={()=>setTab('_workout')}
            wkCompleted={wkCompleted} wkCompletedData={wkCompletedData}
            onViewSummary={viewCompletedSummary}
            onShowProfile={()=>setShowProfile(true)}/>
        </div>
        <div style={{height:'100%',display:tab==='workout'?'block':'none'}}>
          <WorkoutTabScreen onStartWorkout={startWorkout} isEmpty={isEmpty}
            onDayPillTap={(ws)=>setShowDayPreview(ws)}
            wkActive={wkActive}
            onResume={()=>setTab('_workout')}/>
        </div>
        <div style={{height:'100%',display:tab==='nutrition'?'block':'none'}}>
          <NutritionScreen onShowHydration={()=>setShowHydration(true)} isEmpty={isEmpty}/>
        </div>
        <div style={{height:'100%',display:tab==='coach'?'block':'none'}}>
          <CoachScreen isEmpty={isEmpty}/>
        </div>
        <div style={{height:'100%',display:tab==='progress'?'block':'none'}}>
          <ProgressScreen isEmpty={isEmpty}/>
        </div>
      </div>

      {/* Tab Bar */}
      <TabBar active={tab==='_workout'?'workout':tab} onChange={(t)=>{
        if(t==='workout' && wkActive) setTab('_workout');
        else setTab(t);
      }}/>

      {/* Safe area bottom spacer */}
      <div style={{height:0,background:C.tabBg,flexShrink:0}}/>

      {/* Overlay Sheets */}
      {showPreview && (
        <WorkoutPreviewSheet
          onStart={startWorkout}
          onClose={()=>setShowPreview(false)}/>
      )}
      {showHydration && (
        <HydrationDetailSheet onClose={()=>setShowHydration(false)}/>
      )}
      {showProfile && (
        <ProfileSheet onClose={()=>setShowProfile(false)}/>
      )}
      {showDayPreview && (
        <DayPreviewSheet dayData={showDayPreview}
          onStart={startDayWorkout}
          onClose={()=>setShowDayPreview(null)}
          wkActive={wkActive}/>
      )}
      {showConfirm && (
        <ConfirmDialog {...showConfirm}/>
      )}

      {/* Debug Toggle */}
      {!wkActive && (
        <button onClick={()=>setIsEmpty(e=>!e)}
          style={{position:'fixed',bottom:80,left:12,zIndex:500,
            width:36,height:36,borderRadius:9999,
            background:isEmpty?C.error:C.s2,border:`1px solid ${isEmpty?C.error+'4D':C.border}`,
            cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:C.cardShadow||'0 2px 8px rgba(0,0,0,0.3)',transition:'all 0.2s'}}>
          <Ico name={isEmpty?'eye-off':'eye'} size={16} color={isEmpty?C.inv:C.t3}/>
        </button>
      )}
    </div>
    </ThemeCtx.Provider>
  );
}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
